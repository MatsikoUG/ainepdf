<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF – AinePdf</title>
    <meta name="description" content="Convert JPG images to PDF online. Create PDF from images.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                <span class="text-xl font-bold text-gray-900 dark:text-white">AinePdf</span>
            </a>
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
                <svg class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">JPG to PDF</h1>
            <p class="text-gray-600 dark:text-gray-300">Convert JPG images to PDF document. Arrange order by drag and drop.</p>
        </div>

        <div id="dropZone" class="drop-zone mb-8">
            <svg class="drop-zone-icon w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-lg text-gray-700 dark:text-gray-300 mb-2">Drag & drop your JPG images here</p>
            <p class="text-sm text-gray-500">or click to browse</p>
        </div>

        <div id="fileList" class="hidden mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
                <div id="filesContainer" class="space-y-2 max-h-64 overflow-y-auto"></div>
            </div>
        </div>

        <div id="progressContainer" class="hidden mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-700 dark:text-gray-300">Creating PDF...</span>
                    <span id="progressPercent" class="text-gray-500">0%</span>
                </div>
                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                    <div id="progressBar" class="h-full bg-red-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="actions" class="hidden flex flex-col sm:flex-row gap-4 justify-center">
            <button id="convertBtn" class="btn-primary">Convert to PDF</button>
            <button id="clearBtn" class="btn-secondary">Clear</button>
        </div>
    </main>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 mt-16 text-center text-sm text-gray-400">
        <p>© 2024 AinePdf. Files processed locally.</p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const dropZone = document.getElementById('dropZone');
            const fileList = document.getElementById('fileList');
            const filesContainer = document.getElementById('filesContainer');
            const actions = document.getElementById('actions');
            const convertBtn = document.getElementById('convertBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            
            let files = [];
            
            new AinePdf.DropZone(dropZone, {
                accept: ['.jpg', '.jpeg', '.png'],
                maxFiles: 20,
                onFilesSelected: (selectedFiles) => {
                    files = [...files, ...selectedFiles];
                    renderFileList();
                }
            });
            
            function renderFileList() {
                if (files.length === 0) {
                    fileList.classList.add('hidden');
                    actions.classList.add('hidden');
                    return;
                }
                
                fileList.classList.remove('hidden');
                actions.classList.remove('hidden');
                
                filesContainer.innerHTML = files.map((file, index) => `
                    <div class="file-item" data-index="${index}">
                        <div class="flex items-center gap-3">
                            <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <div>
                                <p class="font-medium text-gray-900 dark:text-white">${file.name}</p>
                                <p class="text-xs text-gray-500">${AinePdf.formatFileSize(file.size)}</p>
                            </div>
                        </div>
                        <button class="remove-btn text-gray-400 hover:text-red-500" data-index="${index}">✕</button>
                    </div>
                `).join('');
                
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        files.splice(idx, 1);
                        renderFileList();
                    });
                });
            }
            
            convertBtn.addEventListener('click', async () => {
                if (files.length === 0) {
                    AinePdf.showToast('Select at least one image', 'error');
                    return;
                }
                
                try {
                    progressContainer.classList.remove('hidden');
                    convertBtn.disabled = true;
                    
                    const imageToPdf = new AinePdf.ImageToPdf();
                    const images = await Promise.all(files.map(file => {
                        return new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve(e.target.result);
                            reader.readAsDataURL(file);
                        });
                    }));
                    
                    progressBar.style.width = '50%';
                    progressPercent.textContent = '50%';
                    
                    const pdfBlob = await imageToPdf.convert(images);
                    
                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    
                    AinePdf.downloadBlob(pdfBlob, 'images-to-pdf.pdf');
                    AinePdf.showToast('PDF created successfully!', 'success');
                } catch (error) {
                    AinePdf.showToast('Error: ' + error.message, 'error');
                } finally {
                    convertBtn.disabled = false;
                    setTimeout(() => progressContainer.classList.add('hidden'), 2000);
                }
            });
            
            document.getElementById('clearBtn').addEventListener('click', () => {
                files = [];
                renderFileList();
            });
            
            document.getElementById('darkModeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
            
            if (localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        });
    </script>
</body>
</html>
