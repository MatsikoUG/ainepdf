<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock PDF – AinePdf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                <span class="text-xl font-bold text-gray-900 dark:text-white">AinePdf</span>
            </a>
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
                <svg class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">Unlock PDF</h1>
            <p class="text-gray-600 dark:text-gray-300">Remove password protection from PDF files. Note: Only works with known passwords.</p>
        </div>

        <div id="dropZone" class="drop-zone mb-8">
            <svg class="drop-zone-icon w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <p class="text-lg text-gray-700 dark:text-gray-300 mb-2">Drag & drop your locked PDF here</p>
        </div>

        <div id="passwordSection" class="hidden bg-white dark:bg-gray-800 rounded-lg shadow p-6 mb-8">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Enter PDF Password</label>
                <input id="pdfPassword" type="password" placeholder="Password" class="input-field">
            </div>
        </div>

        <div id="progressContainer" class="hidden mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                    <div id="progressBar" class="h-full bg-red-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="actions" class="hidden flex flex-col sm:flex-row gap-4 justify-center">
            <button id="unlockBtn" class="btn-primary">Unlock PDF</button>
        </div>
    </main>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 mt-16 text-center text-sm text-gray-400">
        <p>© 2024 AinePdf. Files processed locally.</p>
    </footer>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const dropZone = document.getElementById('dropZone');
            const passwordSection = document.getElementById('passwordSection');
            const actions = document.getElementById('actions');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            
            let currentFile = null;
            
            new AinePdf.DropZone(dropZone, {
                accept: ['.pdf'],
                maxFiles: 1,
                onFilesSelected: (files) => {
                    currentFile = files[0];
                    passwordSection.classList.remove('hidden');
                    actions.classList.remove('hidden');
                }
            });
            
            document.getElementById('unlockBtn').addEventListener('click', async () => {
                if (!currentFile) return;
                
                try {
                    progressContainer.classList.remove('hidden');
                    const password = document.getElementById('pdfPassword').value;
                    
                    const arrayBuffer = await currentFile.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { password });
                    
                    // Save without password
                    const pdfBytes = await pdfDoc.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    
                    progressBar.style.width = '100%';
                    AinePdf.downloadBlob(blob, 'unlocked.pdf');
                    AinePdf.showToast('PDF unlocked!', 'success');
                } catch (error) {
                    if (error.message.includes('password')) {
                        AinePdf.showToast('Invalid password', 'error');
                    } else {
                        AinePdf.showToast('Error: ' + error.message, 'error');
                    }
                } finally {
                    setTimeout(() => progressContainer.classList.add('hidden'), 2000);
                }
            });
            
            document.getElementById('darkModeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
            if (localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        });
    </script>
</body>
</html>
