<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF – AinePdf</title>
    <meta name="description" content="Compress PDF files online. Reduce file size while maintaining quality.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M8 13h2v2H8zm0 4h2v2H8z"/></svg>
                <span class="text-xl font-bold text-gray-900 dark:text-white">AinePdf</span>
            </a>
            <div class="hidden md:flex space-x-1">
                <a href="../index.html" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300">All Tools</a>
                <a href="merge-pdf.html" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300">Merge PDF</a>
                <a href="split-pdf.html" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300">Split PDF</a>
                <a href="compress-pdf.html" class="px-3 py-2 text-sm text-red-500 bg-red-50">Compress PDF</a>
            </div>
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
                <svg class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414z" clip-rule="evenodd"/></svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">Compress PDF</h1>
            <p class="text-gray-600 dark:text-gray-300">Reduce the size of your PDF files while maintaining quality.</p>
        </div>

        <!-- Drop Zone -->
        <div id="dropZone" class="drop-zone mb-8">
            <svg class="drop-zone-icon w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            <p class="text-lg text-gray-700 dark:text-gray-300 mb-2">Drag & drop your PDF here</p>
            <p class="text-sm text-gray-500">or click to browse</p>
        </div>

        <!-- Quality Selection -->
        <div id="qualitySection" class="hidden bg-white dark:bg-gray-800 rounded-lg shadow p-6 mb-8">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Compression Level</h3>
            <div class="space-y-3">
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700">
                    <input type="radio" name="quality" value="0.3" class="mr-3" checked>
                    <div>
                        <span class="font-medium text-gray-900 dark:text-white">Less Quality</span>
                        <p class="text-sm text-gray-500">Maximum compression, lower quality</p>
                    </div>
                </label>
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700">
                    <input type="radio" name="quality" value="0.5" class="mr-3">
                    <div>
                        <span class="font-medium text-gray-900 dark:text-white">Balanced</span>
                        <p class="text-sm text-gray-500">Good compression with decent quality</p>
                    </div>
                </label>
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700">
                    <input type="radio" name="quality" value="0.8" class="mr-3">
                    <div>
                        <span class="font-medium text-gray-900 dark:text-white">More Quality</span>
                        <p class="text-sm text-gray-500">Less compression, higher quality</p>
                    </div>
                </label>
            </div>
        </div>

        <!-- File Info -->
        <div id="fileInfo" class="hidden bg-white dark:bg-gray-800 rounded-lg shadow p-4 mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-10 h-10 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                    <div>
                        <p id="fileName" class="font-medium text-gray-900 dark:text-white"></p>
                        <p id="fileSize" class="text-sm text-gray-500"></p>
                    </div>
                </div>
                <button id="removeFile" class="text-gray-400 hover:text-red-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressContainer" class="hidden mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-700 dark:text-gray-300">Compressing...</span>
                    <span id="progressPercent" class="text-gray-500">0%</span>
                </div>
                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                    <div id="progressBar" class="h-full bg-red-500 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div id="actions" class="hidden flex flex-col sm:flex-row gap-4 justify-center">
            <button id="compressBtn" class="btn-primary">Compress PDF</button>
            <button id="clearBtn" class="btn-secondary">Clear</button>
        </div>
    </main>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white py-8 mt-16 text-center text-sm text-gray-400">
        <p>© 2024 AinePdf. Files processed locally.</p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('dropZone');
            const qualitySection = document.getElementById('qualitySection');
            const fileInfo = document.getElementById('fileInfo');
            const actions = document.getElementById('actions');
            const compressBtn = document.getElementById('compressBtn');
            const clearBtn = document.getElementById('clearBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            
            let currentFile = null;
            
            new AinePdf.DropZone(dropZone, {
                accept: ['.pdf'],
                maxFiles: 1,
                onFilesSelected: (files) => {
                    currentFile = files[0];
                    document.getElementById('fileName').textContent = currentFile.name;
                    document.getElementById('fileSize').textContent = AinePdf.formatFileSize(currentFile.size);
                    fileInfo.classList.remove('hidden');
                    qualitySection.classList.remove('hidden');
                    actions.classList.remove('hidden');
                },
                onFileError: (file, error) => AinePdf.showToast(error, 'error')
            });
            
            compressBtn.addEventListener('click', async () => {
                if (!currentFile) return;
                
                try {
                    progressContainer.classList.remove('hidden');
                    compressBtn.disabled = true;
                    
                    const quality = parseFloat(document.querySelector('input[name="quality"]:checked').value);
                    const pdfOps = new AinePdf.PdfOperations();
                    
                    // Simulate progress
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 15;
                        if (progress > 90) progress = 90;
                        progressBar.style.width = progress + '%';
                        progressPercent.textContent = progress + '%';
                    }, 200);
                    
                    const result = await pdfOps.compressPdf(currentFile, quality);
                    
                    clearInterval(interval);
                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    
                    const originalSize = currentFile.size;
                    const newSize = result.size;
                    const savings = Math.round((1 - newSize / originalSize) * 100);
                    
                    AinePdf.downloadBlob(result, 'compressed.pdf');
                    AinePdf.showToast(`Compressed! Saved ${savings}% (${AinePdf.formatFileSize(originalSize)} → ${AinePdf.formatFileSize(newSize)})`, 'success');
                } catch (error) {
                    AinePdf.showToast('Error: ' + error.message, 'error');
                } finally {
                    compressBtn.disabled = false;
                    setTimeout(() => progressContainer.classList.add('hidden'), 3000);
                }
            });
            
            clearBtn.addEventListener('click', () => {
                currentFile = null;
                fileInfo.classList.add('hidden');
                qualitySection.classList.add('hidden');
                actions.classList.add('hidden');
            });
            
            document.getElementById('darkModeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
            
            if (localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        });
    </script>
</body>
</html>
